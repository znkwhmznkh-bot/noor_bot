name: Run Noor Bot

on:
  schedule:
    - cron: '30 * * * *' # ينشر دقيقة 30 من كل ساعة
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تحديث للنسخة 4

      - name: Set up Python
        uses: actions/setup-python@v5 # تحديث للنسخة 5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyTelegramBotAPI

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python main.py
