name: Noor Bot Final

on:
  push:
    branches: [ "main" ]  # يشتغل فوراً من تحفظ الملف
  schedule:
    - cron: '30 */2 * * *'  # خليناه ينشر بالدقيقة 30 من كل ساعتين (تغيير للتمويه)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pyTelegramBotAPI

      - name: Execute Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python main.py
